# seed.yaml — Automation Contract for meta-organvm/organvm-corpvs-testamentvm
# Schema: seed/v1.0
# Updated: AUTONOMY Sprint Phase E (orphan resolution)

schema_version: "1.0"
organ: Meta
organ_name: Meta
repo: organvm-corpvs-testamentvm
org: meta-organvm

metadata:
  implementation_status: PRODUCTION
  tier: flagship
  promotion_status: PUBLIC_PROCESS
  last_validated: 2026-03-23
  generated: 2026-02-12
  sprint: AUTONOMY

agents:
  - name: ci
    trigger: on_push
    workflow: .github/workflows/ci-python.yml
    description: "Continuous integration pipeline"

produces:
  - type: meta-documentation
    description: System-wide governance documentation and planning corpus
    consumers: [ORGAN-IV]
  - type: research-tasks
    description: Implementation tasks extracted from research programme (IRF-RES entries)
    consumers: [META-ORGANVM/organvm-engine, META-ORGANVM/praxis-perpetua]
  - type: work-registry
    description: Universal work registry (IRF) consumed by all organs for gap tracking
    consumers: [ALL]
  - type: prompt-registry
    description: Atomized prompt corpus (8,218 prompts → 31,649 atoms) with implementation scorecard
    consumers: [ALL]
  - type: session-continuation-prompts
    description: Context-loaded continuation prompts for resuming paused sessions
    consumers: [ALL]

consumes:
  - type: orchestration-artifact
    source: ORGAN-IV
    description: Orchestration decisions inform meta-documentation

breathing:
  - path: data/fossil/fossil-record.jsonl
    cadence: session-close
    source: witness-hooks
    reason: "Appended by post-commit hooks across all workspace repos"

subscriptions:
  - event: governance.updated
    source: ORGAN-IV
    action: Update meta-system documentation
  - event: health-audit.completed
    source: ORGAN-IV
    action: Review system-wide audit findings
